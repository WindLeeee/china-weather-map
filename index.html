function getWeatherColor(c){
    if(!c)return'#9ca3af';
    if(c.includes('鏅?))return'#fcd34d';
    if(c.includes('澶氫簯')||c.includes('闃?))return'#94a3b8';
    if(c.includes('闆?))return'#60a5fa';
    if(c.includes('闆?)||c.includes('闇?))return'#a8d8ff';
    return'#9ca3af';
}

function getWeatherIcon(c){
    if(!c)return'鉂?;
    if(c.includes('鏅?))return'鈽€锔?;
    if(c.includes('澶氫簯'))return'鉀?;
    if(c.includes('闃?))return'鈽侊笍';

    if(c.includes('闆?))return'鉂勶笍';
    return'鉂?;
}

    var m={0:'鏅?,1:'鏅撮棿澶氫簯',2:'澶氫簯',3:'闃?,45:'闆?,48:'鍐婚浘',51:'灏忔瘺姣涢洦',53:'涓瘺姣涢洦',55:'澶ф瘺姣涢洦',56:'鍐绘瘺姣涢洦',57:'閲嶅喕姣涙瘺闆?,61:'灏忛洦',63:'涓洦',65:'澶ч洦',66:'鍐婚洦',67:'閲嶅喕闆?,71:'灏忛洩',73:'涓洩',75:'澶ч洩',77:'闆矑',80:'灏忛樀闆?,81:'涓樀闆?,82:'澶ч樀闆?,85:'灏忛樀闆?,86:'澶ч樀闆?,95:'闆锋毚',96:'闆锋毚+灏忓啺闆?,99:'闆锋毚+澶у啺闆?};
    return m[code]!==undefined?m[code]:'鏈煡';
}

function initDateBar(){
    var bar=document.getElementById('dateBar');
    forecastDays=[];
    var now=new Date();
    for(var i=0;i<16;i++){var d=new Date(now);d.setDate(now.getDate()+i);forecastDays.push(d);}
    for(var j=0;j<forecastDays.length;j++){
        var btn=document.createElement('button');
        btn.className='date-btn'+(j===0?' active':'');
        btn.dataset.day=j;
        var dayNames=['鍛ㄦ棩','鍛ㄤ竴','鍛ㄤ簩','鍛ㄤ笁','鍛ㄥ洓','鍛ㄤ簲','鍛ㄥ叚'];
        var dayName=j===0?'浠婂ぉ':(j===1?'鏄庡ぉ':dayNames[forecastDays[j].getDay()]);
        btn.innerHTML='<span class="day-name">'+dayName+'</span><span class="day-num">'+forecastDays[j].getDate()+'</span><span class="month">'+(forecastDays[j].getMonth()+1)+'鏈?/span>';
        btn.onclick=(function(idx){return function(){selectDay(idx);};})(j);
        bar.appendChild(btn);
    }
}

function selectDay(idx){
    selectedDay=idx;
    document.querySelectorAll('.date-btn').forEach(function(b,i){b.classList.toggle('active',i===idx);});
    document.getElementById('todayBadge').textContent=idx===0?'浠婃棩':(idx===1?'鏄庢棩':(idx+1)+'澶╁悗');
    updateDisplay();
}

    chart.dispatchAction({type:'geoRoam',zoom:1.2,center:[105,36]});
    window.addEventListener('resize',function(){chart.resize();});

async function loadWeatherFromServer(){
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('progressFill').style.width='0%';
    document.getElementById('progressText').textContent='姝ｅ湪鑾峰彇澶╂皵鏁版嵁鈥?;
    var BATCH=20,data={},total=CITIES.length;
    for(var i=0;i<total;i+=BATCH){
        var batch=CITIES.slice(i,i+BATCH);
        var pct=Math.round(((i+BATCH)/total)*100);
        document.getElementById('progressFill').style.width=pct+'%';
        document.getElementById('progressText').textContent='鍔犺浇涓?'+(i+batch.length)+'/'+total+' 涓煄甯傗€?;
        var promises=batch.map(function(city){
            var params='daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m&timezone=Asia%2FShanghai&forecast_days=16';
            return fetch('https://api.open-meteo.com/v1/forecast?latitude='+city.lat+'&longitude='+city.lon+'&'+params).then(function(r){return r.json();}).then(function(j){return{city:city,data:j};}).catch(function(){return null;});
        });
        var results=await Promise.all(promises);
        results.forEach(function(r){if(r)data[r.city.name]={latitude:r.city.lat,longitude:r.city.lon,daily:r.data.daily,current:r.data.current};});
    }
    allData=data;
    var count=Object.keys(data).length;
    document.getElementById('progressFill').style.width='100%';
    document.getElementById('progressText').textContent='鍔犺浇瀹屾垚锛?;
    document.getElementById('subtitleText').textContent='宸插姞杞?'+count+' 涓煄甯?路 鏈潵16澶╅鎶?路 Open-Meteo';
    document.getElementById('loading').classList.add('hidden');
    updateDisplay();
}

function updateDisplay(){updateMap();updateCityList();}

function updateMap(){
    if(!chart)return;
    var points=[];
    for(var name in allData){
        var city=allData[name],daily=city.daily;
        if(!daily||!daily.time||!daily.time[selectedDay])continue;
        var code=daily.weather_code[selectedDay];
        var tempMax=Math.round(daily.temperature_2m_max[selectedDay]);
        var tempMin=Math.round(daily.temperature_2m_min[selectedDay]);
        points.push({name:name,value:[city.longitude||city.lon,city.latitude||city.lat,Math.round((tempMax+tempMin)/2)],tempMax:tempMax,tempMin:tempMin,condition:weatherCodeToText(code),precip:((daily.precipitation_sum&&daily.precipitation_sum[selectedDay])||0).toFixed(1),wind:Math.round((daily.wind_speed_10m_max&&daily.wind_speed_10m_max[selectedDay])||0)});
    }
    chart.setOption({series:[{data:points}]});
}

function updateCityList(){
    var container=document.getElementById('cityList');
    var list=[];
    for(var name in allData){
        var city=allData[name],daily=city.daily;
        if(!daily||!daily.time||!daily.time[selectedDay])continue;
        var code=daily.weather_code[selectedDay],cond=weatherCodeToText(code);
        var tempMax=Math.round(daily.temperature_2m_max[selectedDay]);
        var tempMin=Math.round(daily.temperature_2m_min[selectedDay]);
        var precip=((daily.precipitation_sum&&daily.precipitation_sum[selectedDay])||0).toFixed(1);
        list.push({name:name,lat:city.latitude||city.lat,lon:city.longitude||city.lon,tempMax:tempMax,tempMin:tempMin,cond:cond,precip:precip,color:getWeatherColor(cond)});
    }
    if(!list.length){container.innerHTML='<div class="empty-tip">鏃犳暟鎹?/div>';return;}
    list.sort(function(a,b){return b.tempMax-a.tempMax;});
    container.innerHTML=list.map(function(city){
        return'<div class="city-item" onclick="focusCity(\''+city.name.replace(/'/g,"\\'")+'\')">'+
            '<div class="top"><span class="city-name">'+city.name+'</span><span class="temp-range" style="color:'+city.color+'">'+city.tempMax+'掳 / '+city.tempMin+'掳</span></div>'+
            '<div class="bottom"><span class="weather-icon">'+getWeatherIcon(city.cond)+'</span><span class="condition">'+city.cond+'</span><span style="margin-left:auto">馃對锔?'+city.precip+'mm</span></div></div>';
    }).join('');
}

function focusCity(name){
    if(!chart)return;
    chart.dispatchAction({type:'showTip',seriesIndex:0,name:name});
    var city=allData[name];
    if(city)chart.dispatchAction({type:'geoRoam',zoom:2.5,center:[city.longitude||city.lon,city.latitude||city.lat]});
}

window.onload=async function(){
    initDateBar();
    await initMap();
    await loadWeatherFromServer();
};
